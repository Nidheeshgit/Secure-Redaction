{% extends "base.html" %}
{% block title %}Login – FileRedactor{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card glass">
        <div class="auth-header">
            <div class="auth-icon"><i class="fa-solid fa-fingerprint"></i></div>
            <h1>Welcome Back</h1>
            <p>Log in to securely manage your redactions.</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="name@company.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password" style="padding-right: 2.5rem;">
                    <button type="button" class="password-toggle" style="position: absolute; right: 0.8rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer;"><i class="fa-solid fa-eye-slash"></i></button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top: 1rem;">
                Sign In <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>
        
        <div class="auth-footer" style="margin-top: 2rem; text-align: center;">
            <p style="color: var(--text-muted); font-size: 0.9rem;">
                Don't have an account? <a href="{{ url_for('auth.register') }}" style="font-weight: 600;">Register here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
